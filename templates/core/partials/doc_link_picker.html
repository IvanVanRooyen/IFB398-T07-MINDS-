<!-- HTMX partial: rendered inside #link-modal-container on prospect_detail.html -->
<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" id="link-picker-modal">
  <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold">Link a Document</h3>
      <button onclick="document.getElementById('link-modal-container').innerHTML=''"
              class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>

    <form hx-post="{% url 'create_doc_link' %}"
          hx-target="#linked-documents"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('link-modal-container').innerHTML=''"
          method="post">
      {% csrf_token %}
      <input type="hidden" name="content_type_label" value="{{ content_type_label }}">
      <input type="hidden" name="object_id" value="{{ object_id }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Select Document</label>
        <select name="document_id"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 text-sm"
                required>
          <option value="">— choose a document —</option>
          {% for doc in documents %}
            <option value="{{ doc.pk }}">{{ doc.title }}{% if doc.doc_type %} ({{ doc.doc_type }}){% endif %}</option>
          {% endfor %}
        </select>
      </div>

      <div class="flex justify-end gap-3">
        <button type="button"
                onclick="document.getElementById('link-modal-container').innerHTML=''"
                class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
          Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 bg-cyan-600 text-white rounded-lg text-sm hover:bg-cyan-700 font-medium">
          Link Document
        </button>
      </div>
    </form>
  </div>
</div>
