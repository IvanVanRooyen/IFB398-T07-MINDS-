distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4320
        http:
          endpoint: 0.0.0.0:4321

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h # 7 days

memberlist:
  bind_port: 7947

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

querier:
  frontend_worker:
    frontend_address: tempo:9095

metrics_generator:
  ring:
    kvstore:
      store: memberlist

  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://tempo:9090/v1/write
  processor:
    span_metrics:
      dimensions:
        - service.name
        - span.name
        - span.kind
        - status.code

