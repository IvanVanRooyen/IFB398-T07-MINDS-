apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200

  - name: Postgres
    type: postgres
    url: db:5432
    access: proxy
    user: grafana
    secureJsonData:
      password: ${GF_PG_READER_PASS}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: 'disable'
      postgresVersion: 1604

  - name: Redis
    type: redis-datasource
    url: redis://redis:6379
    access: proxy
